
<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">成人肥胖臨床評估與治療線上表單</h2>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--color-text-primary)}
.app{max-width:780px;margin:0 auto;padding:1.5rem 1rem}
.top-nav{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap}
.step-bar{display:flex;gap:0;margin-bottom:1.5rem;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);overflow:hidden}
.step{flex:1;padding:8px 4px;text-align:center;font-size:12px;cursor:pointer;color:var(--color-text-secondary);background:var(--color-background-secondary);border-right:0.5px solid var(--color-border-tertiary);transition:background 0.15s}
.step:last-child{border-right:none}
.step.active{background:var(--color-background-info);color:var(--color-text-info);font-weight:500}
.step.done{background:var(--color-background-success);color:var(--color-text-success)}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1rem}
.section-title{font-size:15px;font-weight:500;color:var(--color-text-primary);margin-bottom:1rem;padding-bottom:8px;border-bottom:0.5px solid var(--color-border-tertiary)}
.field-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:12px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:12px;color:var(--color-text-secondary)}
.field input[type=text],.field input[type=number],.field input[type=date],.field textarea,.field select{width:100%;font-family:var(--font-sans);font-size:13px}
.field textarea{min-height:80px;resize:vertical}
.check-grid{display:flex;flex-wrap:wrap;gap:6px 16px;margin-top:4px}
.check-item{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;white-space:nowrap}
.check-item input{cursor:pointer}
.sub-label{font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-top:10px;margin-bottom:4px}
.bmi-display{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 12px;font-size:13px;color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary);text-align:center;min-width:80px}
.bmi-val{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:1rem;gap:8px}
.summary-card{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1rem;white-space:pre-wrap;font-size:13px;line-height:1.7;font-family:var(--font-mono);color:var(--color-text-primary)}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:500}
.badge-info{background:var(--color-background-info);color:var(--color-text-info)}
.badge-success{background:var(--color-background-success);color:var(--color-text-success)}
.badge-warn{background:var(--color-background-warning);color:var(--color-text-warning)}
.divider{border:none;border-top:0.5px solid var(--color-border-tertiary);margin:12px 0}
</style>

<div class="app">
  <div class="top-nav">
    <button onclick="goHome()">← 首頁</button>
    <button onclick="goBack()">← 上一頁</button>
    <span style="flex:1"></span>
    <button onclick="copyContent()" id="copyBtn">複製摘要</button>
    <button onclick="window.print()">列印</button>
  </div>

  <div class="step-bar" id="stepBar">
    <div class="step active" onclick="goStep(0)" id="s0">基本</div>
    <div class="step" onclick="goStep(1)" id="s1">測量</div>
    <div class="step" onclick="goStep(2)" id="s2">病史</div>
    <div class="step" onclick="goStep(3)" id="s3">生活</div>
    <div class="step" onclick="goStep(4)" id="s4">檢查</div>
    <div class="step" onclick="goStep(5)" id="s5">治療</div>
    <div class="step" onclick="goStep(6)" id="s6">目標</div>
    <div class="step" onclick="goStep(7)" id="s7">追蹤</div>
    <div class="step" onclick="goStep(8)" id="s8">摘要</div>
  </div>

  <div id="pages">

  <!-- page 0 -->
  <div id="p0" class="card">
    <div class="section-title">一、基本資料</div>
    <div class="field-row">
      <div class="field"><label>姓名</label><input type="text" id="patientName" /></div>
      <div class="field"><label>病歷號</label><input type="text" id="chartNo" /></div>
      <div class="field"><label>日期</label><input type="date" id="visitDate" /></div>
      <div class="field"><label>醫師</label><input type="text" id="doctorName" /></div>
    </div>
    <div class="field-row">
      <div class="field"><label>年齡</label><input type="number" id="age" /></div>
      <div class="field">
        <label>性別</label>
        <div class="check-grid" id="genderGroup">
          <label class="check-item"><input type="checkbox" data-label="男" />男</label>
          <label class="check-item"><input type="checkbox" data-label="女" />女</label>
        </div>
      </div>
      <div class="field">
        <label>就診別</label>
        <div class="check-grid" id="visitTypeGroup">
          <label class="check-item"><input type="checkbox" data-label="初診" />初診</label>
          <label class="check-item"><input type="checkbox" data-label="複診" />複診</label>
        </div>
      </div>
      <div class="field"><label>轉介來源</label><input type="text" id="referralSource" /></div>
    </div>
  </div>

  <!-- page 1 -->
  <div id="p1" class="card" style="display:none">
    <div class="section-title">二、人體測量與肥胖分級</div>
    <div class="field-row" style="align-items:end">
      <div class="field"><label>身高 (cm)</label><input type="number" step="0.1" id="height" oninput="calcBMI()" /></div>
      <div class="field"><label>體重 (kg)</label><input type="number" step="0.1" id="weight" oninput="calcBMI()" /></div>
      <div class="field"><label>腰圍 (cm)</label><input type="number" step="0.1" id="waist" /></div>
      <div>
        <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:4px">BMI (自動)</div>
        <div class="bmi-display"><span class="bmi-val" id="bmiVal">—</span><br><span id="bmiCat" style="font-size:11px"></span></div>
      </div>
    </div>
    <hr class="divider">
    <div class="sub-label">BMI 分類（台灣成人）</div>
    <div class="check-grid" id="bmiGroup">
      <label class="check-item"><input id="bmiUnder" type="checkbox" data-label="&lt;18.5 體重過輕" />&lt;18.5 過輕</label>
      <label class="check-item"><input id="bmiNormal" type="checkbox" data-label="18.5–23.9 正常" />18.5–23.9 正常</label>
      <label class="check-item"><input id="bmiOver" type="checkbox" data-label="24.0–26.9 過重" />24.0–26.9 過重</label>
      <label class="check-item"><input id="bmiObese1" type="checkbox" data-label="27.0–29.9 肥胖" />27.0–29.9 肥胖</label>
      <label class="check-item"><input id="bmiObese2" type="checkbox" data-label="30.0–34.9 中度肥胖" />30.0–34.9 中度</label>
      <label class="check-item"><input id="bmiObese3" type="checkbox" data-label="35.0–39.9 重度肥胖" />35.0–39.9 重度</label>
      <label class="check-item"><input id="bmiObese4" type="checkbox" data-label="≥40 病態性肥胖" />≥40 病態性</label>
    </div>
    <hr class="divider">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:4px">
      <div>
        <div class="sub-label">腹部肥胖</div>
        <div class="check-grid" id="waistGroup">
          <label class="check-item"><input type="checkbox" data-label="男 ≥90cm" />男 ≥90cm</label>
          <label class="check-item"><input type="checkbox" data-label="女 ≥80cm" />女 ≥80cm</label>
          <label class="check-item"><input type="checkbox" data-label="未達腹部肥胖" />未達</label>
        </div>
      </div>
      <div>
        <div class="sub-label">近期體重變化</div>
        <div class="check-grid" id="weightChangeGroup">
          <label class="check-item"><input type="checkbox" data-label="3個月內增加≥5%" />增加≥5%</label>
          <label class="check-item"><input type="checkbox" data-label="3個月內減少≥5%" />減少≥5%</label>
          <label class="check-item"><input type="checkbox" data-label="穩定" />穩定</label>
        </div>
      </div>
    </div>
  </div>

  <!-- page 2 -->
  <div id="p2" class="card" style="display:none">
    <div class="section-title">三、病史與次級原因</div>
    <div class="sub-label">相關共病（可複選）</div>
    <div class="check-grid" id="comorbidityGroup">
      <label class="check-item"><input type="checkbox" data-label="第二型糖尿病/前期" />第二型糖尿病/前期</label>
      <label class="check-item"><input type="checkbox" data-label="高血壓" />高血壓</label>
      <label class="check-item"><input type="checkbox" data-label="高血脂" />高血脂</label>
      <label class="check-item"><input type="checkbox" data-label="冠心病/ASCVD" />冠心病/ASCVD</label>
      <label class="check-item"><input type="checkbox" data-label="NAFLD/MASLD" />NAFLD/MASLD</label>
      <label class="check-item"><input type="checkbox" data-label="高尿酸/痛風" />高尿酸/痛風</label>
      <label class="check-item"><input type="checkbox" data-label="睡眠呼吸中止症" />睡眠呼吸中止症</label>
      <label class="check-item"><input type="checkbox" data-label="骨關節炎" />骨關節炎</label>
      <label class="check-item"><input type="checkbox" data-label="PCOS" />PCOS</label>
      <label class="check-item"><input type="checkbox" data-label="GERD" />GERD</label>
      <label class="check-item"><input type="checkbox" data-label="憂鬱/焦慮" />憂鬱/焦慮</label>
    </div>
    <div class="field" style="margin-top:8px"><label>其他共病</label><input type="text" id="otherComorbidity" /></div>
    <hr class="divider">
    <div class="sub-label">可能造成體重增加之因素</div>
    <div class="check-grid" id="weightFactorGroup">
      <label class="check-item"><input type="checkbox" data-label="家族史" />家族史</label>
      <label class="check-item"><input type="checkbox" data-label="久坐工作" />久坐工作</label>
      <label class="check-item"><input type="checkbox" data-label="睡眠不足" />睡眠不足</label>
      <label class="check-item"><input type="checkbox" data-label="輪班" />輪班</label>
      <label class="check-item"><input type="checkbox" data-label="壓力大" />壓力大</label>
      <label class="check-item"><input type="checkbox" data-label="情緒性進食" />情緒性進食</label>
      <label class="check-item"><input type="checkbox" data-label="酒精攝取" />酒精攝取</label>
      <label class="check-item"><input type="checkbox" data-label="停菸後體重增加" />停菸後體重增加</label>
    </div>
    <hr class="divider">
    <div class="sub-label">次級肥胖/藥物相關評估</div>
    <div class="check-grid" id="secondaryGroup">
      <label class="check-item"><input type="checkbox" data-label="疑甲狀腺低下" />疑甲狀腺低下</label>
      <label class="check-item"><input type="checkbox" data-label="疑庫欣症候群" />疑庫欣症候群</label>
      <label class="check-item"><input type="checkbox" data-label="疑下視丘/內分泌異常" />疑下視丘/內分泌</label>
      <label class="check-item"><input type="checkbox" data-label="抗精神病藥物" />抗精神病藥物</label>
      <label class="check-item"><input type="checkbox" data-label="抗憂鬱藥物" />抗憂鬱藥物</label>
      <label class="check-item"><input type="checkbox" data-label="類固醇" />類固醇</label>
      <label class="check-item"><input type="checkbox" data-label="胰島素/促泌劑" />胰島素/促泌劑</label>
      <label class="check-item"><input type="checkbox" data-label="其他致胖藥物" />其他致胖藥物</label>
      <label class="check-item"><input type="checkbox" data-label="未見明顯次級因素" />未見明顯次級因素</label>
    </div>
  </div>

  <!-- page 3 -->
  <div id="p3" class="card" style="display:none">
    <div class="section-title">四、生活型態與行為評估</div>
    <div class="sub-label">飲食型態</div>
    <div class="check-grid" id="dietGroup">
      <label class="check-item"><input type="checkbox" data-label="高糖飲食" />高糖飲食</label>
      <label class="check-item"><input type="checkbox" data-label="高脂飲食" />高脂飲食</label>
      <label class="check-item"><input type="checkbox" data-label="夜食症候群" />夜食症候群</label>
      <label class="check-item"><input type="checkbox" data-label="暴食行為" />暴食行為</label>
      <label class="check-item"><input type="checkbox" data-label="外食為主" />外食為主</label>
      <label class="check-item"><input type="checkbox" data-label="少量多餐" />少量多餐</label>
      <label class="check-item"><input type="checkbox" data-label="不規律進食" />不規律進食</label>
    </div>
    <div class="field" style="margin-top:8px"><label>每日餐次/加餐重點</label><input type="text" id="mealPattern" /></div>
    <hr class="divider">
    <div class="sub-label">活動與睡眠</div>
    <div class="check-grid" id="activityGroup">
      <label class="check-item"><input type="checkbox" data-label="久坐為主" />久坐為主</label>
      <label class="check-item"><input type="checkbox" data-label="規律運動" />規律運動</label>
      <label class="check-item"><input type="checkbox" data-label="睡眠 &lt;6h" />睡眠 &lt;6h</label>
      <label class="check-item"><input type="checkbox" data-label="睡眠品質差" />睡眠品質差</label>
    </div>
    <div class="field" style="margin-top:8px"><label>運動類型</label><input type="text" id="exerciseType" /></div>
    <hr class="divider">
    <div class="sub-label">減重歷史</div>
    <div class="check-grid" id="historyGroup">
      <label class="check-item"><input type="checkbox" data-label="曾節食" />曾節食</label>
      <label class="check-item"><input type="checkbox" data-label="曾藥物減重" />曾藥物減重</label>
      <label class="check-item"><input type="checkbox" data-label="曾手術減重" />曾手術減重</label>
      <label class="check-item"><input type="checkbox" data-label="溜溜球效應" />溜溜球效應</label>
      <label class="check-item"><input type="checkbox" data-label="無減重史" />無減重史</label>
    </div>
    <div class="field" style="margin-top:8px"><label>過去最成功減重 (kg)</label><input type="number" id="bestLoss" /></div>
    <hr class="divider">
    <div class="sub-label">動機與可行性</div>
    <div class="check-grid" id="motivationGroup">
      <label class="check-item"><input type="checkbox" data-label="動機強" />動機強</label>
      <label class="check-item"><input type="checkbox" data-label="動機普通" />動機普通</label>
      <label class="check-item"><input type="checkbox" data-label="家庭支持佳" />家庭支持佳</label>
      <label class="check-item"><input type="checkbox" data-label="時間配合度高" />時間配合度高</label>
    </div>
  </div>

  <!-- page 4 -->
  <div id="p4" class="card" style="display:none">
    <div class="section-title">五、檢查與代謝風險</div>
    <div class="field-row">
      <div class="field"><label>血壓 (mmHg)</label><input type="text" id="bp" placeholder="e.g. 130/85" /></div>
      <div class="field"><label>空腹血糖/HbA1c</label><input type="text" id="sugar" /></div>
      <div class="field"><label>血脂 (TC/TG/HDL/LDL)</label><input type="text" id="lipid" /></div>
      <div class="field"><label>AST/ALT</label><input type="text" id="lft" /></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Cr/eGFR</label><input type="text" id="renal" /></div>
      <div class="field"><label>尿酸</label><input type="text" id="uric" /></div>
      <div class="field"><label>TSH</label><input type="text" id="tsh" /></div>
      <div class="field"><label>其他檢查</label><input type="text" id="otherLab" /></div>
    </div>
  </div>

  <!-- page 5 -->
  <div id="p5" class="card" style="display:none">
    <div class="section-title">六、治療分級與處置</div>
    <div class="sub-label">治療適應症</div>
    <div class="check-grid" id="indicationGroup">
      <label class="check-item"><input type="checkbox" data-label="BMI≥24 + 共病" />BMI≥24 + 共病</label>
      <label class="check-item"><input type="checkbox" data-label="BMI≥27" />BMI≥27</label>
      <label class="check-item"><input type="checkbox" data-label="BMI≥30 積極介入" />BMI≥30 積極介入</label>
      <label class="check-item"><input type="checkbox" data-label="BMI≥35 考慮手術" />BMI≥35 考慮手術</label>
    </div>
    <hr class="divider">
    <div class="sub-label">生活型態處方</div>
    <div class="check-grid" id="lifestyleRxGroup">
      <label class="check-item"><input type="checkbox" data-label="低熱量飲食(-500kcal)" />低熱量飲食(-500kcal)</label>
      <label class="check-item"><input type="checkbox" data-label="低碳飲食" />低碳飲食</label>
      <label class="check-item"><input type="checkbox" data-label="地中海飲食" />地中海飲食</label>
      <label class="check-item"><input type="checkbox" data-label="有氧運動≥150分/週" />有氧運動≥150分/週</label>
      <label class="check-item"><input type="checkbox" data-label="阻力訓練" />阻力訓練</label>
      <label class="check-item"><input type="checkbox" data-label="行為認知治療" />行為認知治療</label>
      <label class="check-item"><input type="checkbox" data-label="飲食日記" />飲食日記</label>
    </div>
    <hr class="divider">
    <div class="sub-label">藥物治療</div>
    <div class="check-grid" id="medGroup">
      <label class="check-item"><input type="checkbox" data-label="GLP-1 RA (semaglutide/liraglutide)" />GLP-1 RA</label>
      <label class="check-item"><input type="checkbox" data-label="GIP/GLP-1 (tirzepatide)" />GIP/GLP-1 (tirzepatide)</label>
      <label class="check-item"><input type="checkbox" data-label="Orlistat" />Orlistat</label>
      <label class="check-item"><input type="checkbox" data-label="Naltrexone/Bupropion" />Naltrexone/Bupropion</label>
      <label class="check-item"><input type="checkbox" data-label="Topiramate" />Topiramate</label>
    </div>
    <div class="field" style="margin-top:8px"><label>其他藥物/劑量</label><input type="text" id="otherMed" /></div>
    <hr class="divider">
    <div class="sub-label">手術/內視鏡</div>
    <div class="check-grid" id="procedureGroup">
      <label class="check-item"><input type="checkbox" data-label="胃袖狀切除" />胃袖狀切除</label>
      <label class="check-item"><input type="checkbox" data-label="胃繞道" />胃繞道</label>
      <label class="check-item"><input type="checkbox" data-label="胃內水球" />胃內水球</label>
      <label class="check-item"><input type="checkbox" data-label="內視鏡胃成形術" />內視鏡胃成形術</label>
      <label class="check-item"><input type="checkbox" data-label="尚未評估" />尚未評估</label>
    </div>
  </div>

  <!-- page 6 -->
  <div id="p6" class="card" style="display:none">
    <div class="section-title">七、治療目標</div>
    <div class="check-grid" id="goalGroup">
      <label class="check-item"><input type="checkbox" data-label="3–6個月減重5%" />3–6個月減重5%</label>
      <label class="check-item"><input type="checkbox" data-label="3–6個月減重10%" />3–6個月減重10%</label>
      <label class="check-item"><input type="checkbox" data-label="維持體重不再上升" />維持體重不再上升</label>
      <label class="check-item"><input type="checkbox" data-label="改善血糖" />改善血糖</label>
      <label class="check-item"><input type="checkbox" data-label="改善血壓" />改善血壓</label>
      <label class="check-item"><input type="checkbox" data-label="改善血脂" />改善血脂</label>
      <label class="check-item"><input type="checkbox" data-label="改善睡眠/OSA" />改善睡眠/OSA</label>
      <label class="check-item"><input type="checkbox" data-label="改善脂肪肝" />改善脂肪肝</label>
    </div>
    <div class="field-row" style="margin-top:12px">
      <div class="field"><label>短期目標</label><input type="text" id="shortGoal" /></div>
      <div class="field"><label>長期目標</label><input type="text" id="longGoal" /></div>
    </div>
  </div>

  <!-- page 7 -->
  <div id="p7" class="card" style="display:none">
    <div class="section-title">八、追蹤計畫與醫囑</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px">
      <div>
        <div class="sub-label">追蹤頻率</div>
        <div class="check-grid" id="followupGroup">
          <label class="check-item"><input type="checkbox" data-label="2–4週追蹤" />2–4週</label>
          <label class="check-item"><input type="checkbox" data-label="1個月追蹤" />1個月</label>
          <label class="check-item"><input type="checkbox" data-label="3個月追蹤" />3個月</label>
        </div>
      </div>
      <div>
        <div class="sub-label">追蹤內容</div>
        <div class="check-grid" id="monitorGroup">
          <label class="check-item"><input type="checkbox" data-label="追蹤體重/BMI/腰圍" />體重/BMI/腰圍</label>
          <label class="check-item"><input type="checkbox" data-label="檢視飲食紀錄" />飲食紀錄</label>
          <label class="check-item"><input type="checkbox" data-label="評估藥物療效/副作用" />藥物療效/副作用</label>
        </div>
      </div>
      <div>
        <div class="sub-label">轉介</div>
        <div class="check-grid" id="referralGroup">
          <label class="check-item"><input type="checkbox" data-label="轉營養師" />轉營養師</label>
          <label class="check-item"><input type="checkbox" data-label="轉運動/復健" />轉運動/復健</label>
          <label class="check-item"><input type="checkbox" data-label="轉心理/身心科" />轉心理/身心科</label>
        </div>
      </div>
    </div>
    <div class="field" style="margin-top:12px"><label>醫師備註</label><textarea id="note" placeholder="請輸入醫師備註"></textarea></div>
    <div class="field" style="margin-top:8px"><label>醫師簽名</label><input type="text" id="signature" /></div>
  </div>

  <!-- page 8: summary -->
  <div id="p8" class="card" style="display:none">
    <div class="section-title" style="display:flex;justify-content:space-between;align-items:center">
      <span>摘要預覽</span>
      <button onclick="generateSummary()" style="font-size:12px">重新產生摘要</button>
    </div>
    <div id="summaryOut" class="summary-card" style="min-height:200px;color:var(--color-text-secondary)">請點選「重新產生摘要」</div>
    <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
      <button onclick="copyContent()" id="copyBtn2">複製摘要</button>
      <button onclick="submitEmail()">以 Email 送出</button>
      <button onclick="window.print()">列印</button>
    </div>
  </div>

  </div><!-- /pages -->

  <div class="nav-row">
    <button onclick="prevPage()" id="prevBtn" style="visibility:hidden">← 上一步</button>
    <span id="pageIndicator" style="font-size:12px;color:var(--color-text-secondary)">步驟 1 / 9</span>
    <button onclick="nextPage()" id="nextBtn">下一步 →</button>
  </div>
</div>

<script>
let cur = 0;
const total = 9;

function g(id){return document.getElementById(id)}
function val(id){const e=g(id);return e?(e.value||'').trim():''}
function checks(gid){const c=g(gid);if(!c)return[];return Array.from(c.querySelectorAll('input[type=checkbox]:checked')).map(cb=>cb.dataset.label||'').filter(Boolean)}

function goStep(n){
  if(n===8)generateSummary();
  g('p'+cur).style.display='none';
  g('s'+cur).classList.remove('active');
  cur=n;
  g('p'+cur).style.display='';
  g('s'+cur).classList.add('active');
  g('pageIndicator').textContent='步驟 '+(cur+1)+' / '+total;
  g('prevBtn').style.visibility=cur===0?'hidden':'visible';
  g('nextBtn').textContent=cur===total-1?'完成':'下一步 →';
  window.scrollTo(0,0);
}

function nextPage(){
  if(cur<total-1){
    g('s'+cur).classList.add('done');
    goStep(cur+1);
  }
}

function prevPage(){if(cur>0)goStep(cur-1)}

function goHome(){
  if(confirm('返回首頁將清除目前填寫內容，確定嗎？')){
    location.reload();
  }
}

function goBack(){
  if(cur>0){prevPage();}
  else{history.back();}
}

function calcBMI(){
  const h=parseFloat(val('height')), w=parseFloat(val('weight'));
  const bv=g('bmiVal'), bc=g('bmiCat');
  const boxes=document.querySelectorAll('#bmiGroup input');
  boxes.forEach(b=>b.checked=false);
  if(h>0&&w>0){
    const bmi=w/Math.pow(h/100,2);
    bv.textContent=bmi.toFixed(1);
    let cat='',tid='';
    if(bmi<18.5){cat='過輕';tid='bmiUnder';}
    else if(bmi<24){cat='正常';tid='bmiNormal';}
    else if(bmi<27){cat='過重';tid='bmiOver';}
    else if(bmi<30){cat='肥胖';tid='bmiObese1';}
    else if(bmi<35){cat='中度肥胖';tid='bmiObese2';}
    else if(bmi<40){cat='重度肥胖';tid='bmiObese3';}
    else{cat='病態性肥胖';tid='bmiObese4';}
    bc.textContent=cat;
    const el=g(tid);if(el)el.checked=true;
  } else {
    bv.textContent='—'; bc.textContent='';
  }
}

function buildText(){
  const lines=[];
  const add=(label,value)=>{if(value)lines.push(label+'：'+value);};
  const addSection=t=>lines.push('\n【'+t+'】');

  lines.push('成人肥胖臨床評估與治療摘要');
  lines.push('═'.repeat(36));

  addSection('基本資料');
  add('姓名',val('patientName'));
  add('病歷號',val('chartNo'));
  add('日期',val('visitDate'));
  add('醫師',val('doctorName'));
  add('年齡',val('age')?(val('age')+'歲'):'');
  add('性別',checks('genderGroup').join('、'));
  add('就診別',checks('visitTypeGroup').join('、'));
  add('轉介來源',val('referralSource'));

  addSection('人體測量');
  add('身高',val('height')?(val('height')+' cm'):'');
  add('體重',val('weight')?(val('weight')+' kg'):'');
  const bmiTxt=g('bmiVal').textContent;
  if(bmiTxt&&bmiTxt!=='—')add('BMI',bmiTxt+' kg/m² ('+g('bmiCat').textContent+')');
  add('腰圍',val('waist')?(val('waist')+' cm'):'');
  add('腹部肥胖',checks('waistGroup').join('、'));
  add('體重變化',checks('weightChangeGroup').join('、'));

  addSection('共病與次級原因');
  const cm=checks('comorbidityGroup');
  if(cm.length)add('共病',cm.join('、'));
  add('其他共病',val('otherComorbidity'));
  const wf=checks('weightFactorGroup');
  if(wf.length)add('體重增加因素',wf.join('、'));
  const sec=checks('secondaryGroup');
  if(sec.length)add('次級評估',sec.join('、'));

  addSection('生活型態');
  const diet=checks('dietGroup');
  if(diet.length)add('飲食型態',diet.join('、'));
  add('餐次模式',val('mealPattern'));
  const act=checks('activityGroup');
  if(act.length)add('活動/睡眠',act.join('、'));
  add('運動類型',val('exerciseType'));
  const hist=checks('historyGroup');
  if(hist.length)add('減重歷史',hist.join('、'));
  add('最大減重',val('bestLoss')?(val('bestLoss')+' kg'):'');
  add('動機',checks('motivationGroup').join('、'));

  addSection('檢查數值');
  add('血壓',val('bp'));
  add('血糖/HbA1c',val('sugar'));
  add('血脂',val('lipid'));
  add('AST/ALT',val('lft'));
  add('Cr/eGFR',val('renal'));
  add('尿酸',val('uric'));
  add('TSH',val('tsh'));
  add('其他',val('otherLab'));

  addSection('治療計畫');
  const ind=checks('indicationGroup');
  if(ind.length)add('治療適應症',ind.join('、'));
  const lrx=checks('lifestyleRxGroup');
  if(lrx.length)add('生活處方',lrx.join('、'));
  const med=checks('medGroup');
  if(med.length)add('藥物',med.join('、'));
  add('其他藥物',val('otherMed'));
  const proc=checks('procedureGroup');
  if(proc.length)add('手術/內視鏡',proc.join('、'));

  addSection('治療目標');
  const goals=checks('goalGroup');
  if(goals.length)add('目標',goals.join('、'));
  add('短期目標',val('shortGoal'));
  add('長期目標',val('longGoal'));

  addSection('追蹤計畫');
  add('追蹤頻率',checks('followupGroup').join('、'));
  add('追蹤內容',checks('monitorGroup').join('、'));
  add('轉介',checks('referralGroup').join('、'));
  add('醫師備註',val('note'));

  lines.push('\n'+'─'.repeat(36));
  add('醫師簽名',val('signature'));
  lines.push('版本：線上版 v2.0');

  return lines.join('\n');
}

function generateSummary(){
  g('summaryOut').textContent=buildText();
}

function copyContent(){
  const txt=buildText();
  navigator.clipboard.writeText(txt).then(()=>{
    const btn=g('copyBtn');
    if(btn){btn.textContent='✓ 已複製';setTimeout(()=>btn.textContent='複製摘要',2000);}
    const btn2=g('copyBtn2');
    if(btn2){btn2.textContent='✓ 已複製';setTimeout(()=>btn2.textContent='複製摘要',2000);}
  });
}

function submitEmail(){
  const name=val('patientName')||'未命名';
  const subj='成人肥胖評估表單 - '+name;
  const body=buildText();
  window.location.href='mailto:jimmy603@ms3.hinet.net?cc=edmaster@cgmh.org.tw,cgmhim@cgmh.org.tw&subject='+encodeURIComponent(subj)+'&body='+encodeURIComponent(body);
}

goStep(0);
</script>
